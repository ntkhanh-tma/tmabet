<mat-toolbar class="header">
  <div class="header__left">
    @if (auth.username()) {
      <div class="header__user">
        <mat-chip class="header__user-chip" (click)="openLogin()">
          <mat-icon matChipAvatar>account_circle</mat-icon>
          {{ auth.username() }}
        </mat-chip>
        <button mat-icon-button matTooltip="Log out" class="header__logout-btn" (click)="logout()">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    } @else {
      <button mat-stroked-button class="header__login-btn" (click)="openLogin()">
        <mat-icon>login</mat-icon>
        Sign in
      </button>
    }
  </div>

  <div class="header__center">
    <span class="header__greeting">{{ greeting }}, {{ auth.username() ?? 'Champion' }}! ⚽</span>
    <span class="header__date">{{ currentDate | date: 'EEEE, MMMM d, y' }}</span>
  </div>

  <div class="header__right">
    <span class="header__addicts-label">{{ addictCount }} con nghiện đã đặt bet cho trận tiếp theo</span>

    <button mat-icon-button matTooltip="Refresh data">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  <!-- Far-right stacked action buttons: Momo deposit + Teams join -->
  <div class="header__actions">
    <a class="header__action-btn header__action-btn--momo"
       href="tel:0937882323"
       matTooltip="Momo: 0937882323"
       matTooltipPosition="left">
      <img src="assets/momo.svg" alt="Momo" class="header__action-icon" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"/>
      <mat-icon style="display:none">payment</mat-icon>
      <span class="header__action-label">0937 882 323</span>
    </a>
    <a class="header__action-btn header__action-btn--teams"
       href="https://teams.live.com/l/invite/FEASHIJgfrOsLIzcA"
       target="_blank"
       rel="noopener"
       matTooltip="Join Teams group"
       matTooltipPosition="left">
      <mat-icon>groups</mat-icon>
      <span class="header__action-label">Teams</span>
    </a>
  </div>
</mat-toolbar>
