name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from the Actions tab

# Only one deployment at a time; cancel any in-progress run for the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build → gh-pages branch
    runs-on: ubuntu-latest

    # Need write access to push the gh-pages branch.
    permissions:
      contents: write

    steps:
      # ── 1. Source checkout ────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Full history needed so we can push to a different branch later.
          fetch-depth: 0

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      # ── 4. Determine base-href ────────────────────────────────────────────
      #
      # Default: /<repo-name>/  (standard GitHub Pages project URL)
      # Override: set a repository variable called BASE_HREF for custom domains
      #   e.g. BASE_HREF=/  for a user/org page or custom domain.
      #
      - name: Resolve base-href
        run: |
          BASE_HREF="${{ vars.BASE_HREF }}"
          if [ -z "$BASE_HREF" ]; then
            BASE_HREF="/${{ github.event.repository.name }}/"
          fi
          # Wrap in double-quotes to ensure it's treated as a string in the next step
          printf 'BASE_HREF=%s\n' "$BASE_HREF" >> "$GITHUB_ENV"
          echo "Deploying with base-href: $BASE_HREF"

      # ── 5. Inject Google Sheets API key ───────────────────────────────────
      #
      # The key lives in the GOOGLE_SHEETS_API_KEY repository secret (Settings →
      # Secrets and variables → Actions). The source tree only contains the
      # __GOOGLE_API_KEY__ placeholder in environment.prod.ts.
      #
      - name: Inject Google API key
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "::error::GOOGLE_SHEETS_API_KEY secret is not set — add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          sed -i "s|__GOOGLE_API_KEY__|$GOOGLE_API_KEY|g" src/environments/environment.prod.ts
          echo "Injected GOOGLE_API_KEY into environment.prod.ts"

      # ── 6. Production build ───────────────────────────────────────────────
      #
      # angular.json outputPath.base = "docs", outputPath.browser = ""  → flat ./docs/
      #
      # Running through `npm run build` (rather than `ng build` directly) makes
      # npm fire the `postbuild` lifecycle script automatically, which copies
      # index.html -> 404.html and creates .nojekyll — the SPA-routing fix for
      # GitHub Pages (see scripts/postbuild.js).
      #
      - name: Build (production)
        run: npm run build -- --base-href="$BASE_HREF"

      # ── 7. Push docs/ to gh-pages branch ────────────────────────────────
      #
      # Strategy:
      #   a) Move ./docs out of the git working tree.
      #   b) Check out (or create orphan) the gh-pages branch.
      #   c) Wipe the working tree so the branch only contains what we publish.
      #   d) Restore ./docs.
      #   e) Commit & force-push.
      #
      - name: Deploy to gh-pages branch
        run: |
          # Save built output before switching branches
          cp -r docs /tmp/angular-docs

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check out existing branch or start an orphan
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Wipe everything (tracked + untracked), keep only .git/
          git rm -rf . --quiet 2>/dev/null || true
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true

          # Restore the build under docs/ — GitHub Pages should be configured
          # to serve from the gh-pages branch, /docs folder.
          cp -r /tmp/angular-docs docs

          # Commit (skip if nothing changed)
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing new to deploy — skipping commit."
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            git commit -m "deploy: ${SHORT_SHA} ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push origin gh-pages --force-with-lease 2>/dev/null \
              || git push origin gh-pages --force
          fi
